name: "script.go"
description: "Write your deployment scripts in Go: build them as Go plugins and run them with SSH helpers for remote commands, file uploads, and env files"
author: "Ali Najafizadeh"

inputs:
  paths:
    description: "Comma-separated paths (relative to workspace) to the Go script folders. Each folder must be its own Go module with a go.mod file."
    required: true
  workspace:
    description: "Path to the workspace, usually ${{ github.workspace }}"
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ github.action_path }}
      run: go run ./cmd/script "${{ inputs.workspace }}" "${{ inputs.paths }}"

branding:
  icon: "terminal"
  color: "gray-dark"
